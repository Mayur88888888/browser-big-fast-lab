<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ToolCall-15 — in-browser Qwen3 tool-calling bench</title>
<style>
  body { background:#14161a; color:#e8e6e3; font:13px/1.6 ui-monospace, Menlo, monospace; margin:24px; max-width:980px; }
  h3 { font-weight:600; } pre { background:#1b1e25; border:1px solid #2a2e37; border-radius:8px; padding:14px; white-space:pre-wrap; word-break:break-word; }
  .ok { color:#9ece6a; } .bad { color:#f7768e; } .dim { color:#8a8f98; } .warn { color:#e0af68; } .part { color:#7aa2f7; }
</style>
</head>
<body>
<h3>ToolCall-15 <span class="dim">— in-browser via raw ORT-web + Qwen3 native tool calls (vendored stevibe/ToolCall-15, MIT)</span></h3>
<pre id="out">starting…</pre>
<script type="module">
// Drives the vendored ToolCall-15 bench (web/vendor/toolcall15-benchmark.ts, transpiled in-browser
// via Sucrase) against an in-browser Qwen3 ORT session. Replaces ToolCall-15's OpenAI-API transport
// with the same prefill+greedy KV-cache decode as run-one-ort.html, parsing Qwen's <tool_call> output.
// Params: ?model= &dtype=q4f16 &tok= &kv=fp16|fp32 &ort=1.26.0 &max=320 &think=0|1 &scenarios=TC-01,TC-07
import { AutoTokenizer } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@4/+esm';
import { transform } from 'https://esm.sh/sucrase@3.35.0/dist/index.js';

const out = document.getElementById('out');
const log = (s, cls) => { out.innerHTML += `\n${cls ? `<span class="${cls}">${s}</span>` : s}`; };
const p = new URLSearchParams(location.search);
const MODEL_ARG = p.get('model') ?? 'onnx-community/Qwen3-1.7B-ONNX';
const DTYPE = p.get('dtype') ?? 'q4f16';
const TOK   = p.get('tok');
const KV    = p.get('kv') ?? 'fp16';
const ORTV  = p.get('ort') ?? '1.26.0';
const MAXNEW = +(p.get('max') ?? 320);
const THINK = p.get('think') === '1';
const ONLY  = p.get('scenarios');

function resolve(arg, dtype) {
  if (arg.endsWith('.onnx')) { const root = arg.replace(/\/onnx\/[^/]+$/, ''); return { onnx: arg, config: root + '/config.json', repo: root }; }
  const root = `https://huggingface.co/${arg}/resolve/main`;
  return { onnx: `${root}/onnx/model_${dtype}.onnx`, config: `${root}/config.json`, repo: arg };
}
function h2f(h){ const s=(h&0x8000)>>15,e=(h&0x7c00)>>10,f=h&0x03ff; if(e===0)return(s?-1:1)*2**-14*(f/1024); if(e===0x1f)return f?NaN:(s?-1:1)*Infinity; return(s?-1:1)*2**(e-15)*(1+f/1024); }
function argmaxRow(logits, off, V, isF16){ let best=0,bestL=-Infinity; for(let v=0;v<V;v++){ const l=isF16?h2f(logits[off+v]):logits[off+v]; if(l>bestL){bestL=l;best=v;} } return best; }

// Parse Qwen3 <tool_call>{json}</tool_call> blocks -> provider-style tool calls (+ _args object).
function parseToolCalls(text){
  const calls=[]; const re=/<tool_call>\s*([\s\S]*?)\s*<\/tool_call>/g; let m,i=0;
  while((m=re.exec(text))){ try{ const o=JSON.parse(m[1]); calls.push({ id:`call_${i++}`, type:'function', function:{ name:o.name, arguments:JSON.stringify(o.arguments??{}) }, _args:o.arguments??{} }); }catch{} }
  const content=text.replace(/<tool_call>[\s\S]*?<\/tool_call>/g,'').replace(/^\s*<think>[\s\S]*?<\/think>\s*/,'').trim();
  return { content, toolCalls:calls };
}
// from ToolCall-15 lib/llm-client.createInitialMessages
function createInitialMessages(SYSTEM_PROMPT, userMessage){
  return [{ role:'system', content:`${SYSTEM_PROMPT}\n\nBenchmark context: today is 2026-03-20 (Friday). Use this date for any relative time request.` },
          { role:'user', content:userMessage }];
}

async function loadBenchmark(){
  const ts = await (await fetch('/web/vendor/toolcall15-benchmark.ts')).text();
  const js = transform(ts, { transforms:['typescript'] }).code;
  return await import(URL.createObjectURL(new Blob([js], { type:'text/javascript' })));
}

async function run(){
  const result = { model: MODEL_ARG, dtype: DTYPE, think: THINK, backend:'raw-ort-webgpu' };
  if(!navigator.gpu){ log('No WebGPU.','bad'); window.__result=result; window.__done=true; return; }
  try{
    const u = resolve(MODEL_ARG, DTYPE);
    log(`model: ${u.onnx}`,'dim');
    const B = await loadBenchmark();
    log(`benchmark: ${B.SCENARIOS.length} scenarios · ${B.UNIVERSAL_TOOLS.length} tools`,'dim');
    const cfg = await (await fetch(u.config)).json();
    const L = cfg.num_hidden_layers, Hkv = cfg.num_key_value_heads ?? cfg.num_attention_heads;
    const headDim = cfg.head_dim ?? Math.floor(cfg.hidden_size/cfg.num_attention_heads);
    const eosSet = new Set([].concat(cfg.eos_token_id ?? 151645).map(Number));
    const tok = await AutoTokenizer.from_pretrained(TOK ?? u.repo);
    const ort = await import(`https://cdn.jsdelivr.net/npm/onnxruntime-web@${ORTV}/dist/ort.webgpu.min.mjs`);

    const opts = { executionProviders:['webgpu'], graphOptimizationLevel:'disabled' };
    const base = u.onnx.split('/').pop(); const externalData=[];
    const HEAD = async (url)=>{ try{ const r=await fetch(url,{method:'HEAD'}); return r.ok; }catch{ return false; } };
    for(const sfx of ['_data','.data']){ if(await HEAD(u.onnx+sfx)){ externalData.push({path:base+sfx,data:u.onnx+sfx}); for(let n=1; await HEAD(`${u.onnx}${sfx}_${n}`); n++) externalData.push({path:`${base}${sfx}_${n}`,data:`${u.onnx}${sfx}_${n}`}); break; } }
    if(externalData.length){ opts.externalData=externalData; log(`external data: ${externalData.length} chunk(s)`,'dim'); }
    const tLoad=performance.now();
    const session = await ort.InferenceSession.create(u.onnx, opts);
    log(`loaded: ${((performance.now()-tLoad)/1000).toFixed(1)}s`,'dim');

    const kvType = KV==='fp32'?'float32':'float16'; const KVArr = KV==='fp32'?Float32Array:Uint16Array;
    const i64 = (arr)=>new ort.Tensor('int64', BigInt64Array.from(arr, BigInt), [1,arr.length]);
    const emptyPast = ()=>{ const f={}; for(let l=0;l<L;l++){ f[`past_key_values.${l}.key`]=new ort.Tensor(kvType,new KVArr(0),[1,Hkv,0,headDim]); f[`past_key_values.${l}.value`]=new ort.Tensor(kvType,new KVArr(0),[1,Hkv,0,headDim]); } return f; };

    // greedy KV-cache decode of a prompt-id array -> generated text (think block stripped)
    async function decode(promptIds){
      const generated=[]; let past=emptyPast(), curIds=promptIds, posBase=0;
      for(let step=0; step<MAXNEW; step++){
        if(step % 8 === 0) await new Promise(r=>setTimeout(r));  // yield a macrotask so the renderer stays responsive across long runs
        const seqLen=curIds.length, totalLen=posBase+seqLen;
        const o=await session.run({ input_ids:i64(curIds), attention_mask:i64(new Array(totalLen).fill(1)), position_ids:i64(Array.from({length:seqLen},(_,i)=>posBase+i)), ...past });
        const V=o.logits.dims[2], isF16=o.logits.type==='float16', off=(o.logits.dims[1]-1)*V;
        const next=argmaxRow(o.logits.data, off, V, isF16);
        if(eosSet.has(next)) break;
        generated.push(next);
        const np={}; for(let l=0;l<L;l++){ np[`past_key_values.${l}.key`]=o[`present.${l}.key`]; np[`past_key_values.${l}.value`]=o[`present.${l}.value`]; }
        past=np; posBase=totalLen; curIds=[next];
      }
      return tok.decode(generated, { skip_special_tokens:true });
    }
    async function callModel(messages){
      const promptText = tok.apply_chat_template(messages, { tools:B.UNIVERSAL_TOOLS, add_generation_prompt:true, tokenize:false, enable_thinking:THINK });
      const ids=[...tok(promptText,{add_special_tokens:false}).input_ids.data].map(Number);
      return parseToolCalls(await decode(ids));
    }

    // port of ToolCall-15 lib/orchestrator.runScenarioForModel (no provider retries/emit)
    async function runScenario(scn){
      const state={ toolCalls:[], toolResults:[], assistantMessages:[], finalAnswer:'', meta:{} };
      const messages=createInitialMessages(B.SYSTEM_PROMPT, scn.userMessage);
      const trace=[`user=${scn.userMessage}`];
      try{
        for(let turn=1; turn<=8; turn++){
          const { content, toolCalls } = await callModel(messages);
          state.assistantMessages.push(content);
          trace.push(`assistant_${turn}=${content || '[tool_calls_only]'}`);
          if(toolCalls.length===0){ state.finalAnswer=content; messages.push({role:'assistant',content}); break; }
          messages.push({ role:'assistant', content, tool_calls: toolCalls.map(tc=>({ type:'function', function:{ name:tc.function.name, arguments:tc._args } })) });
          for(const tc of toolCalls){
            const record={ id:tc.id, name:tc.function.name, rawArguments:tc.function.arguments, arguments:tc._args, turn };
            state.toolCalls.push(record);
            trace.push(`tool_call=${record.name} ${record.rawArguments}`);
            const r = await scn.handleToolCall(state, record);
            state.toolResults.push({ callId:tc.id, name:tc.function.name, result:r });
            trace.push(`tool_result=${JSON.stringify(r)}`);
            messages.push({ role:'tool', tool_call_id:tc.id, content: JSON.stringify(r) });
          }
        }
      }catch(e){ return { scenarioId:scn.id, status:'fail', points:0, summary:String(e?.message??e), rawLog:trace.join('\n') }; }
      if(!state.finalAnswer) state.finalAnswer = state.assistantMessages.at(-1) ?? '';
      trace.push(`final=${state.finalAnswer}`);
      const ev = scn.evaluate(state);
      return { scenarioId:scn.id, status:ev.status, points:ev.points, summary:ev.summary, note:ev.note, toolCallsMade:state.toolCalls.length, rawLog:trace.join('\n') };
    }

    const scenarios = ONLY ? B.SCENARIOS.filter(s=>ONLY.split(',').includes(s.id)) : B.SCENARIOS;
    log(`\nrunning ${scenarios.length} scenario(s)…`,'dim');
    const results=[]; const t0=performance.now();
    for(const scn of scenarios){
      const r = await runScenario(scn);
      results.push(r);
      const cls = r.status==='pass'?'ok':r.status==='partial'?'part':'bad';
      log(`${scn.id} [${scn.category}] ${scn.title.padEnd(28)} ${r.status.toUpperCase()} (${r.points}) — ${r.summary}`, cls);
    }
    const summary = B.scoreModelResults(results);
    log(`\n── per category ──`,'dim');
    for(const c of summary.categoryScores) log(`${c.category} ${c.label.padEnd(22)} ${c.earned}/${c.max}  ${c.percent}%`, 'dim');
    log(`\nFINAL: ${summary.finalScore}%  (${summary.totalPoints}/${summary.maxPoints} pts · ${summary.rating ?? ''})`, 'ok');
    Object.assign(result, { finalScore:summary.finalScore, totalPoints:summary.totalPoints, maxPoints:summary.maxPoints, categoryScores:summary.categoryScores, scenarioResults:results, benchSec:+((performance.now()-t0)/1000).toFixed(1) });
    await session.release?.();
  }catch(e){ result.error=String(e?.stack??e?.message??e); log('\nERROR: '+result.error,'bad'); }
  window.__result=result; window.__done=true;
}
window.__done=false; run();
</script>
</body>
</html>
