<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>browser-big-fast lab — raw ORT-web AR runner (big-model loader)</title>
<style>
  body { background:#14161a; color:#e8e6e3; font:14px/1.6 ui-monospace, Menlo, monospace; margin:24px; max-width:900px; }
  h3 { font-weight:600; }
  pre { background:#1b1e25; border:1px solid #2a2e37; border-radius:8px; padding:14px; white-space:pre-wrap; word-break:break-word; }
  .ok { color:#9ece6a; } .bad { color:#f7768e; } .dim { color:#8a8f98; } .warn { color:#e0af68; }
</style>
</head>
<body>
<h3>raw ORT-web AR runner <span class="dim">— onnxruntime-web@1.26.0 + hand-written KV-cache loop (past the transformers.js wasm wall)</span></h3>
<pre id="out">starting…</pre>

<script type="module">
// The big-model loader. transformers.js's bundled ORT bad_alloc's loading embedded q4 ≥~1.3GB;
// raw onnxruntime-web@1.26.0 creates the session fine (proven by ort-load-probe.html). This drives
// the onnx-community "decoder-with-past" graph directly: prefill, then greedy KV-cache decode.
// Same window.__result contract as run-one.html so the ladder/bench can use either backend.
// Params: ?model=<repo id or full .onnx url> &dtype=q4f16 &prompt=.. &max=96 &think=0|1 &ort=1.26.0
import { AutoTokenizer } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@4/+esm';

const out = document.getElementById('out');
const log = (s, cls) => { out.innerHTML += `\n${cls ? `<span class="${cls}">${s}</span>` : s}`; };
const p = new URLSearchParams(location.search);
const MODEL_ARG = p.get('model') ?? 'onnx-community/Qwen3-1.7B-ONNX';
const DTYPE  = p.get('dtype') ?? 'q4f16';
const PROMPT = p.get('prompt') ?? 'Write a short paragraph explaining why the sky is blue.';
const MAXNEW = +(p.get('max') ?? 96);
const THINK  = p.get('think') === '1';
const ORTV   = p.get('ort') ?? '1.26.0';
const OPT    = p.get('opt') ?? 'disabled';
// ?tok= overrides the tokenizer repo — lets a self-served .onnx (e.g. a Studio-exported 8B served
// from :8131) borrow its identical tokenizer straight from an HF repo, instead of from the served root.
const TOK    = p.get('tok');
// ?kv=fp16|fp32 — KV-cache (past_key_values) dtype. q4f16 models use fp16; a q4 model with fp32
// residuals (quantized without float16 conversion) needs fp32 KV. Must match the model's I/O.
const KV     = p.get('kv') ?? 'fp16';

// Resolve a repo id ('onnx-community/Qwen3-1.7B-ONNX') to its onnx/config/tokenizer URLs;
// a full '...model_X.onnx' URL is used as-is (tokenizer/config inferred from the repo root).
function resolve(arg, dtype) {
  if (arg.endsWith('.onnx')) {
    const root = arg.replace(/\/onnx\/[^/]+$/, '');
    return { onnx: arg, config: root + '/config.json', repo: root };
  }
  const root = `https://huggingface.co/${arg}/resolve/main`;
  return { onnx: `${root}/onnx/model_${dtype}.onnx`, config: `${root}/config.json`, repo: arg };
}

// fp16(uint16) -> f32, for argmax over a logits row if the model emits float16 logits.
function h2f(h) {
  const s = (h & 0x8000) >> 15, e = (h & 0x7c00) >> 10, f = h & 0x03ff;
  if (e === 0) return (s ? -1 : 1) * 2 ** -14 * (f / 1024);
  if (e === 0x1f) return f ? NaN : (s ? -1 : 1) * Infinity;
  return (s ? -1 : 1) * 2 ** (e - 15) * (1 + f / 1024);
}
// argmax over the V-length logits row at element offset `off` (handles f32 or f16 storage).
function argmaxRow(logits, off, V, isF16) {
  let best = 0, bestL = -Infinity;
  for (let v = 0; v < V; v++) {
    const l = isF16 ? h2f(logits[off + v]) : logits[off + v];
    if (l > bestL) { bestL = l; best = v; }
  }
  return best;
}

function buildPrompt(text, think) {
  const sw = think ? ' /think' : ' /no_think';
  return `<|im_start|>user\n${text}${sw}<|im_end|>\n<|im_start|>assistant\n`;
}

async function adapterInfo() {
  if (!navigator.gpu) return { webgpu: false };
  try {
    const a = await navigator.gpu.requestAdapter();
    const info = a?.info ?? {};
    return { webgpu: true, vendor: info.vendor, architecture: info.architecture, maxStorageBufferBindingSize: a?.limits?.maxStorageBufferBindingSize };
  } catch (e) { return { webgpu: true, adapterError: String(e?.message ?? e) }; }
}

async function run() {
  const result = { model: MODEL_ARG, dtype: DTYPE, think: THINK, ort: ORTV, backend: 'raw-ort-webgpu' };
  const u = resolve(MODEL_ARG, DTYPE);
  out.textContent = `model: ${u.onnx}\nort:   onnxruntime-web@${ORTV}\nthink: ${THINK}`;
  const adp = await adapterInfo(); result.adapter = adp;
  log(`webgpu: ${adp.webgpu}` + (adp.vendor ? `  [${adp.vendor} / ${adp.architecture}]` : ''), adp.webgpu ? 'dim' : 'bad');
  if (!adp.webgpu) { log('No WebGPU.', 'bad'); window.__result = result; window.__done = true; return; }

  try {
    // --- config + tokenizer + runtime ---
    const cfg = await (await fetch(u.config)).json();
    const L = cfg.num_hidden_layers;
    const Hkv = cfg.num_key_value_heads ?? cfg.num_attention_heads;
    const headDim = cfg.head_dim ?? Math.floor(cfg.hidden_size / cfg.num_attention_heads);
    const eosSet = new Set([].concat(cfg.eos_token_id ?? 151645).map(Number));
    result.arch = { layers: L, kvHeads: Hkv, headDim, vocab: cfg.vocab_size };
    log(`arch:   ${L} layers · ${Hkv} kv-heads · head_dim ${headDim}`, 'dim');

    const tok = await AutoTokenizer.from_pretrained(TOK ?? u.repo);
    const ort = await import(`https://cdn.jsdelivr.net/npm/onnxruntime-web@${ORTV}/dist/ort.webgpu.min.mjs`);

    const opts = { executionProviders: ['webgpu'], graphOptimizationLevel: OPT };
    // External data can be MULTI-CHUNK once weights exceed the 2GB protobuf limit:
    // <name>.onnx_data (chunk 0), <name>.onnx_data_1, _2, … (4B+/big models). Register ALL,
    // each `path` matching the basename the proto records. (run-one.html's transformers.js
    // path handles this internally; here we do it by hand.)
    const base = u.onnx.split('/').pop();
    const externalData = [];
    let weightBytes = 0;
    // HEAD returns {ok,size} so we can sum external-data bytes = the quantized weights ORT uploads
    // to GPU buffers (the dominant, deterministic term of the GPU memory high-water; see result.gpu*).
    const HEAD = async (url) => { try { const r = await fetch(url, { method: 'HEAD' }); return { ok: r.ok, size: +(r.headers.get('content-length') || 0) }; } catch { return { ok: false, size: 0 }; } };
    for (const sfx of ['_data', '.data']) {
      const h0 = await HEAD(u.onnx + sfx);
      if (h0.ok) {
        externalData.push({ path: base + sfx, data: u.onnx + sfx }); weightBytes += h0.size;
        for (let n = 1; ; n++) { const h = await HEAD(`${u.onnx}${sfx}_${n}`); if (!h.ok) break; externalData.push({ path: `${base}${sfx}_${n}`, data: `${u.onnx}${sfx}_${n}` }); weightBytes += h.size; }
        break;
      }
    }
    if (externalData.length) { opts.externalData = externalData; log(`external data: ${externalData.length} chunk(s) · ${(weightBytes/1048576).toFixed(0)} MB weights`, 'dim'); }
    if (!weightBytes) { weightBytes = (await HEAD(u.onnx)).size; }  // embedded-weight models (≤~1.5GB): weights live inside model.onnx
    const tLoad = performance.now();
    const session = await ort.InferenceSession.create(u.onnx, opts);
    result.loadSec = +((performance.now() - tLoad) / 1000).toFixed(1);
    log(`loaded: ${result.loadSec}s (session created)`, 'dim');

    // --- encode prompt ---
    const full = buildPrompt(PROMPT, THINK);
    const promptIds = [...tok(full, { add_special_tokens: false }).input_ids.data].map(Number);
    const P = promptIds.length;

    // empty KV cache: past_key_values.{l}.{key,value} = [1, Hkv, 0, headDim], dtype per ?kv=
    const kvType = KV === 'fp32' ? 'float32' : 'float16';
    const KVArr  = KV === 'fp32' ? Float32Array : Uint16Array;
    const kvBytes = KV === 'fp32' ? 4 : 2;
    const emptyPast = () => {
      const f = {};
      for (let l = 0; l < L; l++) {
        f[`past_key_values.${l}.key`]   = new ort.Tensor(kvType, new KVArr(0), [1, Hkv, 0, headDim]);
        f[`past_key_values.${l}.value`] = new ort.Tensor(kvType, new KVArr(0), [1, Hkv, 0, headDim]);
      }
      return f;
    };
    const i64 = (arr) => new ort.Tensor('int64', BigInt64Array.from(arr, BigInt), [1, arr.length]);

    // --- generation loop (greedy, KV cache) ---
    const generated = [];
    let past = emptyPast();
    let curIds = promptIds, posBase = 0, totalLen = 0;
    let ttft = null; const t0 = performance.now(); let tFirst = null;

    for (let step = 0; step < MAXNEW; step++) {
      const seqLen = curIds.length;
      totalLen = posBase + seqLen;
      const feeds = {
        input_ids: i64(curIds),
        attention_mask: i64(new Array(totalLen).fill(1)),
        position_ids: i64(Array.from({ length: seqLen }, (_, i) => posBase + i)),
        ...past,
      };
      const o = await session.run(feeds);
      const V = o.logits.dims[2];
      const isF16 = o.logits.type === 'float16';
      const off = (o.logits.dims[1] - 1) * V;          // last position's row
      const next = argmaxRow(o.logits.data, off, V, isF16);

      if (ttft === null) { ttft = (performance.now() - t0) / 1000; tFirst = performance.now(); }
      if (eosSet.has(next)) break;
      generated.push(next);

      // roll cache: present.* -> past_key_values.*
      const np = {};
      for (let l = 0; l < L; l++) { np[`past_key_values.${l}.key`] = o[`present.${l}.key`]; np[`past_key_values.${l}.value`] = o[`present.${l}.value`]; }
      past = np;
      posBase = totalLen; curIds = [next];
    }

    const dt = (performance.now() - t0) / 1000;
    const decodeS = tFirst ? (performance.now() - tFirst) / 1000 : dt;
    // Qwen3 emits a leading <think>…</think> wrapper (empty under /no_think) — strip it.
    const text = tok.decode(generated, { skip_special_tokens: true }).replace(/^\s*<think>[\s\S]*?<\/think>\s*/, '');
    Object.assign(result, {
      coherent: text.trim().split(/\s+/).length >= 4,
      tokens: generated.length,
      ttft: ttft != null ? +ttft.toFixed(2) : null,
      genSec: +dt.toFixed(2),
      tokS: +(generated.length / dt).toFixed(1),
      decodeTokS: generated.length > 1 ? +((generated.length - 1) / decodeS).toFixed(1) : null,
      jsHeapMB: performance.memory ? Math.round(performance.memory.usedJSHeapSize / 1048576) : null,
      // Analytic GPU memory high-water (deterministic; WebGPU exposes no memory API). Weights =
      // external-data bytes uploaded to GPU buffers; KV = fp16 cache at peak sequence length.
      gpuWeightsMB: weightBytes ? Math.round(weightBytes / 1048576) : null,
      gpuKVPeakMB: Math.round(L * 2 * Hkv * headDim * (P + generated.length) * kvBytes / 1048576),
      gpuTotalMB: weightBytes ? Math.round((weightBytes + L * 2 * Hkv * headDim * (P + generated.length) * kvBytes) / 1048576) : null,
      peakSeqLen: P + generated.length,
      completion: text.trim(),
    });
    log(`\nload ${result.loadSec}s · TTFT ${result.ttft}s · ${result.tokens} tok · ${result.genSec}s · ${result.tokS} tok/s (decode ${result.decodeTokS})`, 'dim');
    log(`\noutput: ${text.trim().slice(0, 400)}`);
    log(result.coherent ? '\nVERDICT: raw-ORT AR runs ✅' : '\nVERDICT: incoherent ❌', result.coherent ? 'ok' : 'bad');
    await session.release?.();
  } catch (e) {
    result.error = String(e?.stack ?? e?.message ?? e);
    log('\nERROR: ' + result.error, 'bad');
  }
  window.__result = result;
  window.__done = true;
}

window.__done = false;
run();
</script>
</body>
</html>
